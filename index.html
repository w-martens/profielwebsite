<!doctype html>
<html lang="nl">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>W.A. Martens Klankontwerp en Muziekcompositie</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Music&family=Noto+Sans+Symbols+2&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="bg-blobs"></div>
        <div class="overlay-panel"></div>
        <div class="notes-container" id="notesContainer"></div>
        <div class="trail-container" id="trailContainer"></div>
        <div class="color-picker">
            <button type="button" class="dice-button" id="diceButton" title="Randomize colors">
                <span class="dice-face" id="diceFace">⚀︎</span>
            </button>
            <input type="color" id="colorNaam" value="#333333" title="Naam kleur" />
            <input type="color" id="colorInitiaal" value="#94422a" title="Initialen kleur" />
            <input type="color" id="colorBg" value="#ffdab9" title="Achtergrond kleur" />
        </div>
        <div class="naam-container">
            <div class="naam-wrapper">
                <div class="naam-deel">
                    <span class="initiaal">W</span>
                    <span class="naam">Wouter</span>
                </div>
                <div class="naam-deel">
                    <span class="initiaal">A</span>
                    <span class="naam">Adriaan</span>
                </div>
                <div class="naam-deel">
                    <span class="initiaal">M</span>
                    <span class="naam">Martens</span>
                </div>
            </div>
        </div>
        <div class="nav-buttons">
            <button type="button" class="nav-button" aria-label="Over mij">
                <img src="img/over mij.png" alt="Over mij" />
            </button>
            <button type="button" class="nav-button" aria-label="Commercieel werk">
                <img src="img/commercieel werk.png" alt="Commercieel werk" />
            </button>
            <button type="button" class="nav-button" aria-label="Eigen werk">
                <img src="img/eigen werk.png" alt="Eigen werk" />
            </button>
            <button type="button" class="nav-button" aria-label="Contact">
                <img src="img/contact.png" alt="Contact" />
            </button>
        </div>
    <div class="music-player minimized" id="musicPlayer">
        <div class="music-player-inner">
            <div class="player-tab" id="playerTab" title="Toggle player">
                <span class="player-tab-arrow">▶</span>
            </div>
            <div class="player-panel" id="playerPanel">
                <h2>Player</h2>
                <div class="player-track-info" id="trackInfo">—</div>

                <div class="player-controls">
                    <button type="button" class="player-btn" id="prevBtn" title="Previous">⏮</button>
                    <button type="button" class="player-btn" id="playBtn" title="Play">▶</button>
                    <button type="button" class="player-btn" id="stopBtn" title="Stop">⏹</button>
                    <button type="button" class="player-btn" id="nextBtn" title="Next">⏭</button>
                </div>

                <div class="player-progress">
                    <input type="range" id="progressBar" min="0" max="100" value="0" step="0.1" />
                    <div class="player-time">
                        <span id="currentTime">0:00</span>
                        <span id="totalTime">0:00</span>
                    </div>
                </div>

                <div class="player-panel-dials">
                    <div class="mini-dial">
                        <div class="dial-knob big" id="volPanelKnob">
                            <div class="dial-indicator"></div>
                            <div class="dial-dot bl"></div>
                        </div>
                        <span class="dial-label">Volume</span>
                        <span class="dial-value" id="volPanelVal">80</span>
                    </div>
                    <div class="mini-dial">
                        <div class="dial-knob big" id="spdPanelKnob">
                            <div class="dial-indicator"></div>
                            <div class="dial-dot top"></div>
                        </div>
                        <span class="dial-label">Speed</span>
                        <span class="dial-value" id="spdPanelVal">1.0x</span>
                    </div>
                </div>

                <button type="button" class="player-eq-toggle" id="eqToggle">▼ EQ</button>
                <div class="player-eq-body collapsed" id="eqBody">
                    <div class="player-eq-grid" id="eqGrid">
                        <div class="eq-band">
                            <label>60<br>Hz</label>
                            <input type="range" class="eq-slider" data-band="0" min="-12" max="12" value="0" step="0.5" />
                            <span class="eq-band-value" id="eqVal0">0</span>
                        </div>
                        <div class="eq-band">
                            <label>250<br>Hz</label>
                            <input type="range" class="eq-slider" data-band="1" min="-12" max="12" value="0" step="0.5" />
                            <span class="eq-band-value" id="eqVal1">0</span>
                        </div>
                        <div class="eq-band">
                            <label>1k<br>Hz</label>
                            <input type="range" class="eq-slider" data-band="2" min="-12" max="12" value="0" step="0.5" />
                            <span class="eq-band-value" id="eqVal2">0</span>
                        </div>
                        <div class="eq-band">
                            <label>4k<br>Hz</label>
                            <input type="range" class="eq-slider" data-band="3" min="-12" max="12" value="0" step="0.5" />
                            <span class="eq-band-value" id="eqVal3">0</span>
                        </div>
                        <div class="eq-band">
                            <label>12k<br>Hz</label>
                            <input type="range" class="eq-slider" data-band="4" min="-12" max="12" value="0" step="0.5" />
                            <span class="eq-band-value" id="eqVal4">0</span>
                        </div>
                    </div>
                </div>

                <div class="player-tracklist">
                    <h3>Track List</h3>
                    <ul id="trackList"></ul>
                </div>
            </div>
            <div class="player-mini" id="playerMini">
                <div class="mini-top">
                    <button type="button" class="mini-play-btn" id="miniPlayBtn">▶</button>
                    <div class="mini-track-wrap">
                        <span class="player-mini-text" id="miniTrackText">—</span>
                    </div>
                    <span class="mini-time" id="miniTime">0:00</span>
                </div>
                <div class="mini-dials">
                    <div class="mini-dial">
                        <div class="dial-knob" id="volKnob">
                            <div class="dial-indicator"></div>
                            <div class="dial-dot bl"></div>
                        </div>
                        <span class="dial-value" id="volDialVal">80</span>
                    </div>
                    <div class="mini-dial">
                        <div class="dial-knob" id="spdKnob">
                            <div class="dial-indicator"></div>
                            <div class="dial-dot top"></div>
                        </div>
                        <span class="dial-value" id="spdDialVal">1.0x</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
<script>
    const img = document.querySelector(".profile-pic");
    if (img) {
        img.addEventListener("click", () => {
            img.style.transform = "scale(1.3) translateY(-10px)";
            setTimeout(() => {
                img.style.transform = "";
            }, 300);
        });
    }

    // Falling music notes
    const NOTE_CHARS = [
        "𝄠",
        "𝄞",
        "𝄢",
        "𝄣",
        "𝄤",
        "𝄋",
        "𝄌",
        "𝅝",
        "𝅗𝅥",
        "𝅘𝅥",
        "𝅘𝅥𝅮",
        "𝅘𝅥𝅯",
        "𝆙",
    ];

    const notesContainer = document.getElementById("notesContainer");

    function spawnNote() {
        const fall = document.createElement("div");
        fall.className = "note-fall";

        const flip = document.createElement("span");
        flip.className = "note-flip";
        flip.textContent = NOTE_CHARS[Math.floor(Math.random() * NOTE_CHARS.length)];

        const fallDuration = 8 + Math.random() * 10; // 8s - 18s
        const flipDuration = 1 + Math.random() * 3; // 1s - 4s
        const size = 0.8 + Math.random() * 2.2; // 1.2rem - 3.4rem
        const left = Math.random() * 100; // vw
        const drift = (Math.random() * 2 - 1) * 60; // px sideways drift
        const fallDistance = 100 + Math.random() * 20; // vh - ends at/just past the bottom edge, with variance
        const startOpacity = 0.1 + Math.random() * 0.2;

        fall.style.left = left + "vw";
        fall.style.setProperty("--drift", drift + "px");
        fall.style.setProperty("--fall-distance", fallDistance + "vh");
        fall.style.setProperty("--start-opacity", startOpacity);
        fall.style.animationDuration = fallDuration + "s";

        flip.style.fontSize = size + "rem";
        flip.style.animationDuration = flipDuration + "s";

        fall.appendChild(flip);
        notesContainer.appendChild(fall);

        fall.addEventListener("animationend", (e) => {
            if (e.target === fall) fall.remove();
        });
    }

    setInterval(spawnNote, 800);
    for (let i = 0; i < 10; i++) {
        setTimeout(spawnNote, i * 1000);
    }

    // Mouse particle trail of small falling, fading notes
    const trailContainer = document.getElementById("trailContainer");
    let lastTrailTime = 0;
    const TRAIL_THROTTLE_MS = 40;

    function spawnTrailNote(x, y) {
        const note = document.createElement("span");
        note.className = "trail-note";
        note.textContent = NOTE_CHARS[Math.floor(Math.random() * NOTE_CHARS.length)];

        const jitterX = (Math.random() * 2 - 1) * 6;
        const jitterY = (Math.random() * 2 - 1) * 6;
        const tx = (Math.random() * 2 - 1) * 24;
        const ty = 20 + Math.random() * 25;
        const rot = (Math.random() * 2 - 1) * 40;
        const duration = 0.6 + Math.random() * 0.6;
        const size = 0.5 + Math.random() * 0.5;

        note.style.left = x + jitterX + "px";
        note.style.top = y + jitterY + "px";
        note.style.fontSize = size + "rem";
        note.style.setProperty("--tx", tx + "px");
        note.style.setProperty("--ty", ty + "px");
        note.style.setProperty("--rot", rot + "deg");
        note.style.animationDuration = duration + "s";

        trailContainer.appendChild(note);

        note.addEventListener("animationend", () => note.remove());
    }

    window.addEventListener("mousemove", (e) => {
        const now = performance.now();
        if (now - lastTrailTime < TRAIL_THROTTLE_MS) return;
        lastTrailTime = now;
        spawnTrailNote(e.clientX, e.clientY);
    });

    // Color pickers for name, initials, and background
    const root = document.documentElement;
    const colorNaam = document.getElementById("colorNaam");
    const colorInitiaal = document.getElementById("colorInitiaal");
    const colorBg = document.getElementById("colorBg");

    // Browsers restore the last-set value of <input type="color"> on reload,
    // overriding the HTML `value` attribute. Force the real defaults back on
    // every load so the pickers (and page colors) always start consistent.
    const DEFAULT_COLORS = {
        naam: "#333333",
        initiaal: "#94422a",
        bg: "#ffdab9",
    };

    colorNaam.value = DEFAULT_COLORS.naam;
    colorInitiaal.value = DEFAULT_COLORS.initiaal;
    colorBg.value = DEFAULT_COLORS.bg;
    root.style.setProperty("--color-naam", DEFAULT_COLORS.naam);
    root.style.setProperty("--color-initiaal", DEFAULT_COLORS.initiaal);
    root.style.setProperty("--color-bg", DEFAULT_COLORS.bg);

    colorNaam.addEventListener("input", () => {
        root.classList.remove("color-transition"); // manual picking is instant
        root.style.setProperty("--color-naam", colorNaam.value);
    });
    colorInitiaal.addEventListener("input", () => {
        root.classList.remove("color-transition");
        root.style.setProperty("--color-initiaal", colorInitiaal.value);
    });
    colorBg.addEventListener("input", () => {
        root.classList.remove("color-transition");
        root.style.setProperty("--color-bg", colorBg.value);
    });

    // Dice button: rolls through dice faces, then randomizes the 3 colors
    // (the trailing \uFE0E forces plain text presentation instead of a
    // colorful emoji rendering on platforms like Android)
    const DICE_FACES = [
        "⚀\ufe0e",
        "⚁\ufe0e",
        "⚂\ufe0e",
        "⚃\ufe0e",
        "⚄\ufe0e",
        "⚅\ufe0e",
    ];
    const diceButton = document.getElementById("diceButton");
    const diceFace = document.getElementById("diceFace");
    let diceRolling = false;

    function randomColor() {
        const value = Math.floor(Math.random() * 0xffffff);
        return "#" + value.toString(16).padStart(6, "0");
    }

    function randomizeColors() {
        root.classList.add("color-transition");

        colorNaam.value = randomColor();
        colorInitiaal.value = randomColor();
        colorBg.value = randomColor();
        root.style.setProperty("--color-naam", colorNaam.value);
        root.style.setProperty("--color-initiaal", colorInitiaal.value);
        root.style.setProperty("--color-bg", colorBg.value);

        setTimeout(() => {
            root.classList.remove("color-transition");
        }, 850);
    }

    diceButton.addEventListener("click", () => {
        if (diceRolling) return;
        diceRolling = true;
        diceButton.disabled = true;

        const totalDuration = 300; // ms
        const start = performance.now();
        let delay = 30;

        function rollStep() {
            diceFace.textContent = DICE_FACES[Math.floor(Math.random() * DICE_FACES.length)];

            const elapsed = performance.now() - start;
            if (elapsed >= totalDuration) {
                randomizeColors();
                diceButton.disabled = false;
                diceRolling = false;
                return;
            }

            delay += 8; // slow down towards the end, like a dice coming to rest
            setTimeout(rollStep, delay);
        }

        rollStep();
    });

    // Shattered glass effect on nav button click
    const navButtons = document.querySelectorAll(".nav-button");

    function shatterButton(button) {
        if (button.classList.contains("shattering")) return;

        const img = button.querySelector("img");
        if (!img) return;

        const rect = img.getBoundingClientRect();
        const src = img.getAttribute("src");

        button.classList.add("shattering");
        button.disabled = true;

        const shatterContainer = document.createElement("div");
        shatterContainer.className = "shatter-container";
        shatterContainer.style.left = rect.left + "px";
        shatterContainer.style.top = rect.top + "px";
        shatterContainer.style.width = rect.width + "px";
        shatterContainer.style.height = rect.height + "px";

        // Build a jittered grid of points, then split each cell into two
        // randomly-oriented triangles. This produces an irregular, jagged
        // break pattern instead of uniform squares.
        const cols = 6;
        const rows = 4;
        const jitterAmount = 0.4;
        const cellW = rect.width / cols;
        const cellH = rect.height / rows;

        const points = [];
        for (let ry = 0; ry <= rows; ry++) {
            const rowPoints = [];
            for (let rx = 0; rx <= cols; rx++) {
                let x = rx * cellW;
                let y = ry * cellH;
                if (rx > 0 && rx < cols) {
                    x += (Math.random() * 2 - 1) * cellW * jitterAmount;
                }
                if (ry > 0 && ry < rows) {
                    y += (Math.random() * 2 - 1) * cellH * jitterAmount;
                }
                rowPoints.push({ x: x, y: y });
            }
            points.push(rowPoints);
        }

        let maxDuration = 0;
        let shardId = 0;

        function makeShard(tri) {
            const xs = [tri[0].x, tri[1].x, tri[2].x];
            const ys = [tri[0].y, tri[1].y, tri[2].y];
            const minX = Math.min.apply(null, xs);
            const maxX = Math.max.apply(null, xs);
            const minY = Math.min.apply(null, ys);
            const maxY = Math.max.apply(null, ys);
            const w = Math.max(maxX - minX, 1);
            const h = Math.max(maxY - minY, 1);
            const id = "shard-" + shardId++;

            const ns = "http://www.w3.org/2000/svg";
            const svg = document.createElementNS(ns, "svg");
            svg.setAttribute("shape-rendering", "crispEdges");
            svg.setAttribute("image-rendering", "pixelated");
            svg.style.position = "absolute";
            svg.style.left = minX + "px";
            svg.style.top = minY + "px";
            svg.style.width = w + "px";
            svg.style.height = h + "px";
            svg.style.overflow = "hidden";
            svg.style.pointerEvents = "none";

            const defs = document.createElementNS(ns, "defs");
            const clipPath = document.createElementNS(ns, "clipPath");
            clipPath.setAttribute("id", id);
            const poly = document.createElementNS(ns, "polygon");
            poly.setAttribute("shape-rendering", "crispEdges");
            const pts = tri.map(p => (p.x - minX) + "," + (p.y - minY)).join(" ");
            poly.setAttribute("points", pts);
            clipPath.appendChild(poly);
            defs.appendChild(clipPath);
            svg.appendChild(defs);

            const img = document.createElementNS(ns, "image");
            img.setAttribute("href", src);
            img.setAttribute("x", -minX);
            img.setAttribute("y", -minY);
            img.setAttribute("width", rect.width);
            img.setAttribute("height", rect.height);
            img.setAttribute("clip-path", "url(#" + id + ")");
            svg.appendChild(img);

            const shardCenterX = (minX + maxX) / 2 - rect.width / 2;
            const tx = (shardCenterX / (rect.width / 2)) * 25 + (Math.random() * 2 - 1) * 25;
            const ty = 180 + Math.random() * 220;
            const rot = (Math.random() * 2 - 1) * 260;
            const duration = 0.6 + Math.random() * 0.5;
            const delay = Math.random() * 0.1;

            svg.style.setProperty("--tx", tx + "px");
            svg.style.setProperty("--ty", ty + "px");
            svg.style.setProperty("--rot", rot + "deg");
            svg.style.animation = "shatter-fly " + duration + "s " + delay + "s forwards";

            maxDuration = Math.max(maxDuration, duration + delay);

            shatterContainer.appendChild(svg);
        }

        for (let ry = 0; ry < rows; ry++) {
            for (let rx = 0; rx < cols; rx++) {
                const p00 = points[ry][rx];
                const p10 = points[ry][rx + 1];
                const p01 = points[ry + 1][rx];
                const p11 = points[ry + 1][rx + 1];

                if (Math.random() < 0.5) {
                    makeShard([p00, p10, p11]);
                    makeShard([p00, p11, p01]);
                } else {
                    makeShard([p00, p10, p01]);
                    makeShard([p10, p11, p01]);
                }
            }
        }

        document.body.appendChild(shatterContainer);

        setTimeout(
            () => {
                shatterContainer.remove();
                button.classList.remove("shattering");
                button.disabled = false;
            },
            maxDuration * 1000 + 50,
        );
    }

    navButtons.forEach((button) => {
        button.addEventListener("click", () => shatterButton(button));
    });

    // Align the button stack so its left edge sits exactly under the "W"
    // of the name, on any screen size.
    const navButtonsContainer = document.querySelector(".nav-buttons");
    const firstNaamDeel = document.querySelector(".naam-wrapper .naam-deel");

    function alignNavButtonsWithName() {
        if (!navButtonsContainer || !firstNaamDeel) return;
        const rect = firstNaamDeel.getBoundingClientRect();
        navButtonsContainer.style.marginLeft = rect.left + "px";
    }

    alignNavButtonsWithName();
    window.addEventListener("load", alignNavButtonsWithName);

    if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(alignNavButtonsWithName);
    }

    let alignResizeTimer = null;
    window.addEventListener("resize", () => {
        clearTimeout(alignResizeTimer);
        alignResizeTimer = setTimeout(alignNavButtonsWithName, 120);
    });

    // ponytail: Music player — HTML Audio + Web Audio (EQ), radial dials, minimize
    (function() {
        var TRACKS = [
            { name: 'Chyeah', file: 'src/chyeah.mp3' },
            { name: 'Medieval Cloak 4', file: 'src/medieval%20cloak4.mp3' },
            { name: "Serguhhh's Mind", file: 'src/serguhhhs%20mind.mp3' },
            { name: 'Varkentje', file: 'src/varkentje.mp3' },
            { name: 'Xmy3', file: 'src/xmy3.mp3' },
        ];

        var ac, gain, filters, mediaSrc, trackIdx, started, endedNat;
        var audio = new Audio();
        audio.preload = 'auto';
        // preservesPitch=false gives chipmunk/slowed speed+pitch effect
        audio.preservesPitch = false;

        var eqT = ['lowshelf','peaking','peaking','peaking','highshelf'];
        var eqF = [60,250,1000,4000,12000];

        var $ = function(id) { return document.getElementById(id); };
        var playBtn=$('playBtn'),prevBtn=$('prevBtn'),nextBtn=$('nextBtn'),
            stopBtn=$('stopBtn'),prog=$('progressBar'),curT=$('currentTime'),
            totT=$('totalTime'),info=$('trackInfo'),player=$('musicPlayer'),
            tab=$('playerTab'),eqTog=$('eqToggle'),eqBody=$('eqBody'),miniTxt=$('miniTrackText'),
            miniPlay=$('miniPlayBtn'),miniTime=$('miniTime'),
            volKnob=$('volKnob'),spdKnob=$('spdKnob'),volDVal=$('volDialVal'),spdDVal=$('spdDialVal'),
            volPanelKnob=$('volPanelKnob'),spdPanelKnob=$('spdPanelKnob'),volPanelVal=$('volPanelVal'),spdPanelVal=$('spdPanelVal');

        function init() {
            if (!ac) {
                ac = new (window.AudioContext||window.webkitAudioContext)();
                filters = eqT.map(function(t,i) {
                    var f = ac.createBiquadFilter();
                    f.type = t; f.frequency.value = eqF[i]; f.gain.value = 0; f.Q.value = 1;
                    return f;
                });
                gain = ac.createGain();
                gain.gain.value = 0.8;
            }
            if (!mediaSrc && audio.src && audio.src !== '') {
                mediaSrc = ac.createMediaElementSource(audio);
                mediaSrc.connect(filters[0]);
                for (var fi = 0; fi < filters.length - 1; fi++) filters[fi].connect(filters[fi+1]);
                filters[filters.length-1].connect(gain);
                gain.connect(ac.destination);
            }
            if (ac.state === 'suspended') ac.resume();
        }

        function fmt(s) {
            return (isFinite(s) && s >= 0)
                ? Math.floor(s/60)+':'+(Math.floor(s%60)+'').padStart(2,'0')
                : '0:00';
        }

        function updateUI() {
            var a = audio;
            if (a.duration && isFinite(a.duration)) {
                totT.textContent = fmt(a.duration);
                prog.max = a.duration;
            }
            if (!started) prog.value = 0;
            var t = a.currentTime || 0;
            curT.textContent = fmt(t);
            miniTime.textContent = fmt(t);
            prog.value = t;
        }

        function load(i) {
            if (i < 0 || i >= TRACKS.length) return;
            trackIdx = i; init();
            audio.pause();
            audio.src = TRACKS[i].file;
            started = false; endedNat = false;
            info.textContent = TRACKS[i].name;
            miniTxt.textContent = '\u266B ' + TRACKS[i].name;
            totT.textContent = '0:00'; curT.textContent = '0:00'; prog.value = 0;
            miniTime.textContent = '0:00';
            audio.load();
            setPlayBtn(true);
            highlight();
        }

        function togglePlay() {
            init();
            if (audio.paused) {
                if (!started && audio.readyState < 2 && audio.src) {
                    audio.play().then(function() {
                        started = true; setPlayBtn(false);
                        updateUI();
                    }).catch(function(e) { console.error(e); });
                } else if (audio.src) {
                    audio.play();
                    started = true; setPlayBtn(false);
                } else if (TRACKS.length) {
                    load(0);
                }
            } else {
                audio.pause(); setPlayBtn(true);
            }
        }

        function setPlayBtn(paused) {
            var c = paused ? '\u25B6' : '\u23F8';
            playBtn.textContent = c;
            miniPlay.textContent = c;
        }

        function highlight() {
            var items = document.querySelectorAll('#trackList li');
            items.forEach(function(li, i) { li.classList.toggle('active', i === trackIdx); });
        }

        function nextTrack() { load((trackIdx+1)%TRACKS.length); }
        function prevTrack() { if (trackIdx>=0) load((trackIdx-1+TRACKS.length)%TRACKS.length); }

        // Audio events
        audio.addEventListener('loadedmetadata', function() {
            if (audio.duration && isFinite(audio.duration)) {
                totT.textContent = fmt(audio.duration);
                prog.max = audio.duration;
            }
        });

        audio.addEventListener('timeupdate', function() {
            if (started) updateUI();
        });

        audio.addEventListener('play', function() { setPlayBtn(false); });
        audio.addEventListener('pause', function() { setPlayBtn(true); });
        audio.addEventListener('ended', function() { endedNat = true; setPlayBtn(true); nextTrack(); });

        // Track list
        TRACKS.forEach(function(t,i) {
            var li = document.createElement('li');
            li.textContent = t.name;
            li.addEventListener('click', function() {
                init();
                if (i === trackIdx && audio.src) {
                    audio.currentTime = 0;
                    if (audio.paused) togglePlay();
                } else { load(i); }
            });
            $('trackList').appendChild(li);
        });

        // Panel controls
        playBtn.addEventListener('click', togglePlay);
        miniPlay.addEventListener('click', togglePlay);
        prevBtn.addEventListener('click', function() { init(); prevTrack(); });
        nextBtn.addEventListener('click', function() { init(); nextTrack(); });
        stopBtn.addEventListener('click', function() {
            audio.pause(); audio.currentTime = 0; started = false;
            setPlayBtn(true); totT.textContent='0:00'; curT.textContent='0:00';
            prog.value=0; miniTime.textContent='0:00'; miniTxt.textContent='\u2014';
        });

        // Progress seek
        prog.addEventListener('input', function() {
            if (!audio.src || !audio.duration) return;
            audio.currentTime = prog.value;
            curT.textContent = fmt(audio.currentTime);
            miniTime.textContent = fmt(audio.currentTime);
        });

        // Helper: update all volume dials (value 0-100)
        function setVolDial(v) {
            audio.volume = v / 100;
            var rot = 225 + (v / 100 * 270);
            volKnob.style.setProperty('--dial-rotation', rot + 'deg');
            volPanelKnob.style.setProperty('--dial-rotation', rot + 'deg');
            volDVal.textContent = Math.round(v);
            volPanelVal.textContent = Math.round(v);
        }

        // Helper: update all speed dials (value 0.5-2.0)
        function setSpdDial(v) {
            audio.playbackRate = v;
            var norm = (Math.log2(v) + 1) / 2;
            var rot = 225 + norm * 270;
            spdKnob.style.setProperty('--dial-rotation', rot + 'deg');
            spdPanelKnob.style.setProperty('--dial-rotation', rot + 'deg');
            var txt = v.toFixed(1) + 'x';
            spdDVal.textContent = txt;
            spdPanelVal.textContent = txt;
        }

        // Shared drag logic for any knob element
        function makeDial(el, getVal, setVal, min, max, scale) {
            var dragging = false, lastY, startVal;
            el.addEventListener('mousedown', function(e) {
                e.preventDefault(); dragging = true; lastY = e.clientY;
                startVal = getVal();
                el.classList.add('dragging'); document.body.style.cursor = 'none';
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
            });
            function onMove(e) {
                if (!dragging) return;
                var v = Math.max(min, Math.min(max, startVal + (lastY - e.clientY) * scale));
                setVal(v);
            }
            function onUp() { dragging = false; el.classList.remove('dragging'); document.body.style.cursor = ''; document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); }
        }

        // Wire all 4 knobs to the same volume state
        var volKnobs = [volKnob, volPanelKnob];
        volKnobs.forEach(function(el) {
            makeDial(el,
                function() { return audio.volume * 100; },
                function(v) { setVolDial(v); },
                0, 100, 0.5
            );
            el.addEventListener('dblclick', function() { setVolDial(80); });
        });

        // Wire all 4 knobs to the same speed state
        var spdKnobs = [spdKnob, spdPanelKnob];
        spdKnobs.forEach(function(el) {
            makeDial(el,
                function() { return audio.playbackRate; },
                function(v) { setSpdDial(v); },
                0.5, 2.0, 0.01
            );
            el.addEventListener('dblclick', function() { setSpdDial(1.0); });
        });

        // Init dial positions
        setVolDial(80);
        setSpdDial(1.0);

        // EQ sliders
        document.querySelectorAll('.eq-slider').forEach(function(s) {
            s.addEventListener('input', function() {
                var b = +s.dataset.band, v = +s.value;
                $('eqVal'+b).textContent = (v > 0 ? '+' : '') + v;
                if (filters && filters[b]) filters[b].gain.value = v;
            });
            s.addEventListener('dblclick', function() {
                s.value = 0;
                s.dispatchEvent(new Event('input'));
            });
        });

        eqTog.addEventListener('click', function() {
            eqBody.classList.toggle('collapsed');
            eqTog.textContent = eqBody.classList.contains('collapsed') ? '\u25BC EQ' : '\u25B2 EQ';
        });

        tab.addEventListener('click', function() { player.classList.toggle('minimized'); });
        player.classList.add('minimized');
    })();
</script>
